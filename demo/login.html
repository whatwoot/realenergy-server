    // let provider = new ethers.BrowserProvider(window.ethereum);
    let signer;
    let UseWallet;
    let connected;
    let connectedWallet;
    const supports = [];
    let API = location.origin === 'null' || location.origin.startsWith('http://localhost') ? 'http://localhost:23088' : '';

    $(function (){
        $('#prefix').on('change', function (){
            API = $("#prefix option:selected").val();
        })
    });

    const initWallets = ()=>{
        let s = '';
        // 如果只有一个钱包，默认选中
        if(supports.length == 1){
            window.dispatchEvent(new Event("evmCancel"));
            UseWallet = supports[0];
            window.dispatchEvent(new Event("evmReady"));
        }
        let checked;
        for(let w of supports){
            checked =  UseWallet != null && UseWallet.info.uuid == w.info.uuid;
            s+=`<label><input type="radio" name="UserWallet" data-id="${w.info.uuid}"
                value="${w.info.uuid}" ${checked ? 'checked':''}  >
                <img style="width: 16px;height:16px" src="${w.info.icon}">${w.info.name}</label>`;
        }
        $('#supportWallets').html(s);
    }

    let refreshWallet = (wallets)=>{
        if(wallets && wallets.length){
            connected = true;
            connectedWallet = wallets[0];
            $('#evmConnectBtn').hide();
            $('#evmUseBtn').show().html(connectedWallet);
            $('#signBtn').show();
        }else{
            connectedWallet = null;
            connected = false;
            $('#evmConnectBtn').show();
            $('#evmUseBtn').hide();
            $('#signBtn').hide();
        }
    }

    $('#evmConnectBtn').click(async function (){
        console.log('connect');
        if(!UseWallet){
            alert('选择一个钱包');
            return;
        }
        let wallets = await UseWallet.provider.request({method:'eth_requestAccounts'})
            .catch((err)=>{
                if(err.code = 4001){
                    console.log('user cancel');
                }else{
                    console.log('err ', err);
                }
            });

        console.log('request account', wallets);
        refreshWallet(wallets);
    });

    $('#signBtn').click(async function (){
        if(UseWallet){
            var signPrivider = new BrowserProvider(UseWallet.provider);
            const signer = await signPrivider.getSigner();
            const req = await fetch(API + '/api/auth/nonce');
            const nonce = await req.json();
            const time = Math.floor(Date.now()/1000);
            const welcomeMsg = 'Welcome to ChainShield!';
            let signMessageInfo = [
                welcomeMsg,
                '',
                connectedWallet,
                'Login at',
                 time,
                'Nonce:',
                 nonce.data.nonce
            ].join('\n');
            const signMsg = await signer?.signMessage(signMessageInfo);
            console.log('signMsg', signMsg);
            const jwtReq = await fetch(`${API}/api/auth/login`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    addr: connectedWallet,
                    time,
                    nonce: nonce.data.nonce,
                    msg: welcomeMsg,
                    sign: signMsg
                })
            });
            const loginRes = await jwtReq.json()
            console.log('loginRes', loginRes);
            if(loginRes.code == 0){
                const userReq = await fetch(API + '/api/member/info', {
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': loginRes.data.accessToken
                    },
                })
                const userInfo = await userReq.json();
                console.log('userInfo',userInfo)
                document.querySelector('#uid').innerHTML = userInfo.data.id;
            }
        }
    });
    $('#supportWallets').on('click','input',function (){
        console.log(this, this.dataset);
        if(this.checked){
            const provider = supports.find(item=>item.info.uuid == this.dataset.id);
            if(provider){
                // 先取消原来的
                window.dispatchEvent(new Event("evmCancel"));
                UseWallet = provider;
                window.dispatchEvent(new Event("evmReady"));
            }
        }
    })

    // 自定义钱包选择事件事件


    window.addEventListener("evmCancel", async function () {
        console.log('evmCancel', UseWallet);
        if(UseWallet){
            UseWallet.provider?.removeAllListeners('accountsChanged');
            UseWallet.provider?.removeAllListeners('connect');
            UseWallet.provider?.removeAllListeners('disconnect');
        }
    });

    $('#eip712').click(function (){

        // new Contract

        $(this).html();
    });

    window.addEventListener("evmReady", async function (){
        console.log('evmReady', UseWallet);

        UseWallet?.provider?.on('accountsChanged', (accounts) => {
            console.log(`App::Accounts changed:'`, accounts);
            refreshWallet(accounts);
        });

        UseWallet?.provider?.on('connect', (_connectInfo) => {
            console.log(`App::connect`, _connectInfo);
        });

        UseWallet?.provider?.on('disconnect', (error) => {
            console.log(`App::disconnect`, error);
        });

        let selectedAddress = UseWallet?.provider?.selectedAddress;
        console.log('selected', selectedAddress)
        refreshWallet(selectedAddress ? [selectedAddress] : null);
    });

    // 接收钱包插件的事件回调
    window.addEventListener("eip6963:announceProvider", (event) => {
        supports.push(event.detail);
        initWallets();
    });

    // 会触发检测所有兼容eip6963协议的钱包插件
    window.dispatchEvent(new Event("eip6963:requestProvider"));
</script>
